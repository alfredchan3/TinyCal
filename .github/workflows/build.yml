name: build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -project TinyCal.xcodeproj \
            -scheme TinyCal \
            -configuration Debug \
            -destination 'platform=macOS' \
            build
